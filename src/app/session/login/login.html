<section class="login-componente">
    <div class="login-box">

        <div class="img-box">
            <img src="user.svg" alt="img-login" class="login-img">
        </div>

        <div class="right-box">

            <span class="login-title">
                ZenoX - ERP
            </span>

            <span class="login-slogan">
                Sistema de Gestão Integrado para seu negócio
            </span>
            
            <div class="form-box">
                <form #dataForm="ngForm" (ngSubmit)="userLogin()">
                    
                    <div class="input-group">
                        <label for="NM_ENTIDADE">
                            Entidade:
                        </label>
                        
                        <input
                        type="text"
                        name="NM_ENTIDADE"
                        id="NM_ENTIDADE"
                        [(ngModel)]="dataRow.NM_ENTIDADE"
                        readonly
                        >
                    </div>
                    
                    <div class="input-group">
                        <label for="CD_USUARIO">
                            Usuário:
                        </label>
                        
                        <input
                        type="text"
                        name="CD_USUARIO"
                        id="CD_USUARIO"
                        [(ngModel)]="dataRow.CD_USUARIO"
                        >
                    </div>
                    
                    <div class="input-group">
                        <label for="HS_SENHA">
                            Senha:
                        </label>
                        
                        <input
                        type="password"
                        name="HS_SENHA"
                        id="HS_SENHA"
                        [(ngModel)]="dataRow.HS_SENHA"
                        >
                    </div>
                    
                    <div class="input-group">
                        <label for="ID_MES">
                            Mês:
                        </label>
                        
                        <select
                        name="ID_MES"
                        id="ID_MES"
                        [(ngModel)]="dataRow.ID_MES"
                        >
                            <option value="" hidden></option>
                            <option value="1">Janeiro</option>
                            <option value="2">Fevereiro</option>
                            <option value="3">Março</option>
                            <option value="4">Abril</option>
                            <option value="5">Maio</option>
                            <option value="6">Junho</option>
                            <option value="7">Julho</option>
                            <option value="8">Agosto</option>
                            <option value="9">Setembro</option>
                            <option value="10">Outubro</option>
                            <option value="11">Novembro</option>
                            <option value="12">Dezembro</option>
                        </select>
                    </div>
                
                    <div class="input-group">
                        <label for="ID_ANO">
                            Exercício:
                        </label>
                        
                        <select
                        name="ID_ANO"
                        id="ID_ANO"
                        [(ngModel)]="dataRow.ID_ANO"
                        >
                            <option value="" hidden></option>
                            <option value="2026">2026</option>
                        </select>
                    </div>
                    
                    <button
                    type="submit"
                    >
                        Entrar
                    </button>

                </form>
            </div>
        </div>
    </div>
</section>
