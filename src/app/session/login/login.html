<section class="login-component">
    <div class="login-box">
        <div class="form-box">
            
            <span class="form-title">
                Login - Usuário
            </span>

            <form #dataForm="ngForm" (ngSubmit)="userLogin()">

                <div class="input-login">
                    <label for="NM_ENTIDADE">
                        Entidade
                    </label>
    
                    <input type="text"
                    name="NM_ENTIDADE"
                    id="NM_ENTIDADE"
                    [(ngModel)]="dataRow.NM_ENTIDADE"
                    [style.text-transform]="'uppercase'"
                    readonly
                    >
                </div>
    
                <div class="input-login">
                    <label for="CD_USUARIO">
                        Usuário
                    </label>
                    
                    <input type="text"
                    name="CD_USUARIO"
                    id="CD_USUARIO"
                    [(ngModel)]="dataRow.CD_USUARIO"
                    [style.text-transform]="'uppercase'"
                    >
                </div>
    
                <div class="input-login">
                    <label for="HS_SENHA">
                        Senha
                    </label>
                    
                    <input type="password"
                    name="HS_SENHA"
                    id="HS_SENHA"
                    [(ngModel)]="dataRow.HS_SENHA"
                    >
                </div>

                <div class="input-login">
                    <label for="ID_MES">
                        Mês
                    </label>
                    
                    <select
                    name="ID_MES"
                    id="ID_MES"
                    [(ngModel)]="dataRow.ID_MES"
                    >
                        <option value="" hidden></option>
                        <option value="1">Janeiro</option>
                        <option value="2">Fevereiro</option>
                        <option value="3">Março</option>
                        <option value="4">Abril</option>
                        <option value="5">Maio</option>
                        <option value="6">Junho</option>
                        <option value="7">Julho</option>
                        <option value="8">Agosto</option>
                        <option value="9">Setembro</option>
                        <option value="10">Outubro</option>
                        <option value="11">Novembro</option>
                        <option value="12">Dezembro</option>
                    </select>
                </div>
    
                <div class="input-login">
                    <label for="ID_ANO">
                        Exercício
                    </label>
                    
                    <select
                    name="ID_ANO"
                    id="ID_ANO"
                    [(ngModel)]="dataRow.ID_ANO"
                    >
                        <option value="" hidden></option>
                        <option value="2026">2026</option>
                    </select>
                </div>
    
                <div class="tools-login">

                    <button
                    class="btn-login"
                    type="submit"
                    >
                        Entrar
                    </button>
                
                </div>
            </form>
        </div>

        <div class="info-box">

            <div class="info-img">
                <i class="fa-solid fa-compass-drafting"></i>
            </div>

            <span class="info-title">
                Zeno-X MEI
            </span>

            <span class="info-slogan">
                O sistema integrado para gestão da sua empresa MEI de forma facilitada!!
            </span>

            <div class="info-social">
                <i class="fa-brands fa-instagram"></i>
                <i class="fa-solid fa-globe"></i>
                <i class="fa-solid fa-at"></i>
            </div>
        </div>
    </div>
</section>
