<ng-container [ngSwitch]="i.type">

    <ng-container *ngSwitchCase="'text'">
        <input
        type="text"
        [name]="i.field"
        [id]="i.field"
        [(ngModel)]="dataRow[i.field]"
        [disabled]="dataConsult"
        [required]="i.required||false"
        [readonly]="i.readonly||false"
        [ngClass]="{'required': i.required && dataRow[i.field] === ''}"

        *ngIf="i.mask"
        [mask]="i.mask"
        [dropSpecialCharacters]="true"
        >

        <input
        type="text"
        [name]="i.field"
        [id]="i.field"
        [(ngModel)]="dataRow[i.field]"
        [disabled]="dataConsult"
        [required]="i.required||false"
        [readonly]="i.readonly||false"
        [ngClass]="{'required': i.required && dataRow[i.field] === ''}"
        *ngIf="!i.mask"
        >
    </ng-container>

    <ng-container *ngSwitchCase="'number'">
        <input
        type="number"
        [name]="i.field"
        [id]="i.field"
        [(ngModel)]="dataRow[i.field]"
        [disabled]="dataConsult"
        [required]="i.required||false"
        (focus)="readonlyFocus()"
        [readonly]="i.readonly||false"
        [style.text-align]="'right'"
        [ngClass]="{'required': i.required && dataRow[i.field] === ''}"
        >
    </ng-container>

    <ng-container *ngSwitchCase="'date'">
        <input
        type="date"
        [name]="i.field"
        [id]="i.field"
        [(ngModel)]="dataRow[i.field]"
        [disabled]="dataConsult"
        [required]="i.required||false"
        [readonly]="i.readonly||false"
        [ngClass]="{'required': i.required && dataRow[i.field] === ''}"
        >
    </ng-container>

    <ng-container *ngSwitchCase="'lookup'">
        <select
        [name]="i.field"
        [id]="i.field"
        [(ngModel)]="dataRow[i.field]"
        [disabled]="dataConsult"
        [required]="i.required||false"

        (focus)="lookup()"
        (ngModelChange)="autocomplete($event)"

        [ngClass]="{'required': i.required && dataRow[i.field] == ''}"
        >
            <option value="" hidden></option>
            <option *ngFor="let x of dataLookups[i.lookup?.table || '']" [value]="x.ID">
                {{x.DS}}
            </option>
        </select>
    </ng-container>

    <ng-container *ngSwitchCase="'select'">
        <select
        [name]="i.field"
        [id]="i.field"
        [(ngModel)]="dataRow[i.field]"
        [disabled]="dataConsult"
        [required]="i.required||false"
        [ngClass]="{'required': i.required && dataRow[i.field] === ''}"
        >
            <option value="" hidden></option>
            <option *ngFor="let x of i.options" [value]="x.ID">
                {{x.DS}}
            </option>
        </select>
    </ng-container>

    <ng-container *ngSwitchCase="'checkbox'">
        <input
        type="checkbox"
        [name]="i.field"
        [id]="i.field"
        [(ngModel)]="dataRow[i.field]"
        [disabled]="dataConsult"
        [required]="i.required||false"
        >
    </ng-container>

    <ng-container *ngSwitchCase="'textarea'">
        <textarea
        [name]="i.field"
        [id]="i.field"
        [(ngModel)]="dataRow[i.field]"
        [disabled]="dataConsult"
        [required]="i.required||false"
        [ngClass]="{'required': i.required && dataRow[i.field] === ''}"
        ></textarea>
    </ng-container>

    <ng-container *ngSwitchCase="'file'" >

        <div class="input-file">

            <input
            type="file"
            [name]="i.field"
            [id]="i.field"
            [disabled]="dataConsult"
            [required]="i.required||false"
            [ngClass]="{'required': i.required && dataRow[i.field] === ''}"

            class="input-file"
            accept="application/pdf"
            (change)="inputFile($event)">

            <button
            *ngIf="dataRow['SN_ANEXO']"
            (click)="consultFile()"
            class="input-button">
                Consultar
            </button>
        </div>

        <span *ngIf="dataRow[i.field]" [style.color]="'green'">Arquivo Anexado.</span>
    </ng-container>

    <ng-container *ngSwitchCase="'img'" >
        
        <input
        type="file"
        [name]="i.field"
        [id]="i.field"
        [disabled]="dataConsult"
        [required]="i.required||false"
        [ngClass]="{'required': i.required && dataRow[i.field] === ''}"

        class="input-file"
        accept="image/png, image/jpeg, image/webp"
        (change)="inputImg($event)">

            
        
    </ng-container>

</ng-container>
