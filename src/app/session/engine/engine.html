<section class="component">
    <div class="comp-header">
        <span class="comp-title">
            {{ compTitle }}
        </span>
    </div>

    <div class="tools" *ngIf="!dataScreen || dataConsult">
        <button
        class="crud"
        (click)="btnIncluir()"
        >
            Incluir
        </button>
        
        <button
        class="crud"
        (click)="btnAlterar()"
        [disabled]="!dataRow[dataKey]"
        >
            Alterar
        </button>

        <button
        class="crud"
        (click)="btnExcluir()"
        [disabled]="!dataRow[dataKey]"
        >
            Excluir
        </button>

        <button
        class="crud"
        (click)="dataConsult ? btnCancelar() : btnConsultar()"
        [disabled]="!dataRow[dataKey]"
        >
            {{ dataConsult ? "Voltar" : "Consultar"}}
        </button>
    </div>

    <div class="tools" *ngIf="dataScreen && !dataConsult">
        <button
        class="crud"
        (click)="btnSalvar()"
        [disabled]="ngdataForm?.invalid"

        >
            {{ dataUpdate ? "Alterar" : "Salvar"}}
        </button>

        <button
        class="crud"
        (click)="btnCancelar()"
        >
            Cancelar
        </button>
    </div>

    <div class="search-box" *ngIf="!dataScreen">

        <div class="search">
            <label for="DS_PESQUISA">
                Pesquisa:
            </label>
            
            <input
            type="text"
            name="DS_PESQUISA"
            id="DS_PESQUISA"
            [(ngModel)]="dataSearch.DS_PESQUISA"
            >
        </div>

        <button
        class="crud"
        (click)="btnBuscar()"
        >
            Buscar
        </button>
    </div>

    <div class="container" *ngIf="!dataScreen">

        <table class="dataGrid">
            <thead>
                <tr>
                    <th *ngFor="let i of columnsGrid" [style.width.rem]="i.width">
                        {{i.name}}
                    </th>
                </tr>
            </thead>
            <tbody>
                <tr
                *ngFor="let item of dataGrid" id="item[dataKey]"
                (click)="dataRow[dataKey] = item[dataKey]"
                [ngClass]="{'selected' : dataRow[dataKey] === item[dataKey]}"
                >
                    <td *ngFor="let c of columnsGrid" [ngSwitch]="c.type">

                        <ng-container *ngSwitchCase="'lookup'">
                            {{ gridLookup(item[c.field], c.table || '') }}
                        </ng-container>

                        <ng-container *ngSwitchCase="'select'">
                            {{ c.options?.[item[c.field]] }}
                        </ng-container>

                        <ng-container *ngSwitchCase="'sn_ativo'">
                            {{ item[c.field] == 1 ? "Sim" : "Não" }}
                        </ng-container>
                    
                        <ng-container *ngSwitchCase="'date'">
                            {{ item[c.field] | date:'dd/MM/yyyy' }}
                        </ng-container>

                        <ng-container *ngSwitchDefault>
                            {{item[c.field]}}
                        </ng-container>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="container" *ngIf="dataScreen">
        <form #ngdataForm="ngForm" class="dataForm">
            <div class="form-group" *ngFor="let i of dataForm">

                <div class="input-group" [ngSwitch]="i.type" [style.width.rem]="i.width" [style.height.rem]="i.height">

                    <label [for]="i.field">
                        {{ i.label }}
                        <span *ngIf="i.required" [style.color]="'red'">*</span>
                    </label>
                    
                    <app-formgroup
                    [i]="i" 
                    [dataRow]="dataRow" 
                    [dataConsult]="dataConsult"
                    [dataLookups]="dataLookups"
                    (onLookupFocus)="lookup($event)"
                    (onAutocomplete)="autocomplete($event)"
                    ></app-formgroup>

                    <ng-container *ngSwitchCase="'subComponent'" >
                        <app-subengine
                        [subConsult]="dataConsult"
                        [table]="i.field"
                        [dataSub]="dataSub[i.field]"
                        [subForm]="subComponent[i.field].subForm"
                        [subColumns]="subComponent[i.field].subColumns"                        
                        [(subGrid)]="subGrids[i.field]"
                        [supKey]="dataKey"
                        >
                    
                        </app-subengine>
                    </ng-container>
                </div>
            </div>
        </form>
    </div>
</section>
