<section class="menu-component">
    <div class="menu-header">

        <img src="globe.svg" alt="logo.svg" class="menu-logo">

        <span class="menu-title">
            Zeno-X - ERP
        </span>

    </div>

    <div class="menu-links">

        <div class="folder-container" *ngFor="let f of menuEngine">

            <div class="folder-header" (click)="openFolder(f)">
                <i [class]="f.icon" class="folder-icon"></i>
                <strong class="folder-label">{{ f.folder }}</strong>
            </div>

            <div class="folder-itens" *ngIf="f.open">
                <a *ngFor="let i of f.itens"
                [routerLink]="'./' + f.route + '/' + i.route"
                class="folder-item"
                routerLinkActive="active-link"
                skipLocationChange
                >
                    <i [class]="i.icon" class="item-icon"></i>
                    <span class="item-label">{{ i.label }}</span>
                </a>
            </div>
        </div>
    </div>
</section>

<section class="router-component">
    <div class="router-header">
        <div class="router-info">
            <span class="nm_entidade">
                {{ NM_ENTIDADE }}
            </span>
            
            <br>

            <span class="nm_usuario">
                Usuário: {{ NM_USUARIO }} | Exercício: {{ ID_ANO }}
            </span>
        </div>
    </div>
    <router-outlet></router-outlet>
</section>
